<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body{% if page.layout == 'post' %} class="post-page"{% endif %}>
    <div class="site-shell">
      <header class="site-header">
        <div class="container site-header-inner">
          <a class="site-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
          <nav aria-label="Primary">
            <ul class="nav-list">
              <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Home</a></li>
              <li><a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} aria-current="page"{% endif %}>About</a></li>
              <li><a href="{{ '/blog/' | relative_url }}"{% if page.url == '/blog/' or page.layout == 'post' %} aria-current="page"{% endif %}>Blog</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main class="container page-content">
        {{ content }}
      </main>

      <footer class="site-footer">
        <div class="container site-footer-inner">
          <p>Built with Jekyll for a simple GitHub Pages site.</p>
          <p><a href="https://github.com/daniel-petrovic">GitHub</a></p>
        </div>
      </footer>
    </div>
  </body>
</html>
