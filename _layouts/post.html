---
layout: default
---
<article class="panel post-article">
  <header>
    <p class="eyebrow">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lead">{{ page.description }}</p>
    {% endif %}
    {% if page.tags and page.tags.size > 0 %}
      <ul class="tag-list" aria-label="Tags">
        {% for tag in page.tags %}
          <li>{{ tag }}</li>
        {% endfor %}
      </ul>
    {% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
