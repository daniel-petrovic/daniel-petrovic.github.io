title: Daniel Petrovic
description: Personal website and coding notes about software engineering, C++, tooling, and simple web projects.
url: https://daniel-petrovic.github.io
baseurl: ""
markdown: kramdown
permalink: /blog/:title/
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post

exclude:
  - README.md
  - vendor
